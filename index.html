<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#0a0a0a;
  color:#fff;
  min-height:100vh;
  overflow:hidden;
}

/* Scanner fullscreen */
.scan-page{
  display:flex;
  flex-direction:column;
  height:100vh;
  padding:12px;
  padding-bottom:env(safe-area-inset-bottom,12px);
}
.header{
  text-align:center;
  padding:12px 0 8px;
  flex-shrink:0;
}
.header h1{
  font-size:18px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
}
.header .subtitle{
  font-size:11px;
  color:#888;
  margin-top:2px;
}
.scan-count{
  font-size:12px;
  color:#c9a44a;
  margin-top:4px;
}

#reader{
  width:100%!important;
  max-width:400px;
  margin:0 auto;
  border-radius:16px;
  overflow:hidden;
  background:#111;
  flex:1;
  min-height:0;
}
#reader video{border-radius:16px}
#reader img[alt="Info icon"]{display:none}

#html5-qrcode-anchor-scan-type-change{
  color:#aaa!important;
  text-decoration:none!important;
  font-size:13px!important;
}
#reader select,#reader button{
  background:#222!important;
  color:#fff!important;
  border:1px solid #333!important;
  border-radius:8px!important;
  padding:8px 12px!important;
  font-size:14px!important;
}
#reader button{
  background:#c9a44a!important;
  color:#000!important;
  font-weight:600!important;
  border:none!important;
}

/* Modal overlay */
.modal-overlay{
  position:fixed;
  inset:0;
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{
  from{opacity:0}to{opacity:1}
}
@keyframes scaleIn{
  from{opacity:0;transform:scale(0.9)}
  to{opacity:1;transform:scale(1)}
}

.modal-overlay.bg-ok{background:rgba(39,174,96,0.15);backdrop-filter:blur(8px)}
.modal-overlay.bg-used{background:rgba(231,76,60,0.15);backdrop-filter:blur(8px)}
.modal-overlay.bg-notfound{background:rgba(230,126,34,0.15);backdrop-filter:blur(8px)}
.modal-overlay.bg-error{background:rgba(231,76,60,0.15);backdrop-filter:blur(8px)}
.modal-overlay.bg-loading{background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}

.modal{
  width:100%;
  max-width:380px;
  border-radius:20px;
  padding:28px 22px 22px;
  animation:scaleIn 0.25s ease;
  position:relative;
}

.modal-ok{
  background:linear-gradient(160deg,#0d2818 0%,#1a4a2a 100%);
  border:1.5px solid #2ecc71;
}
.modal-used{
  background:linear-gradient(160deg,#2a0d0d 0%,#4a1a1a 100%);
  border:1.5px solid #e74c3c;
}
.modal-notfound{
  background:linear-gradient(160deg,#2a1a0d 0%,#4a2a1a 100%);
  border:1.5px solid #e67e22;
}
.modal-error{
  background:linear-gradient(160deg,#1a0d0d 0%,#2a1515 100%);
  border:1.5px solid #e74c3c;
}

.modal .icon{font-size:48px;text-align:center;margin-bottom:8px}
.modal .title{
  text-align:center;
  font-size:20px;
  font-weight:800;
  letter-spacing:0.5px;
  margin-bottom:4px;
}
.modal .title.green{color:#2ecc71}
.modal .title.red{color:#e74c3c}
.modal .title.orange{color:#e67e22}

.modal .name{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin:6px 0 16px;
  color:#fff;
}

.modal .info{
  background:rgba(255,255,255,0.06);
  border-radius:14px;
  padding:12px 16px;
  margin-bottom:20px;
}
.modal .info .row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:14px;
}
.modal .info .row:last-child{border-bottom:none}
.modal .info .label{color:#999;font-size:13px;flex-shrink:0}
.modal .info .value{
  color:#fff;
  font-weight:500;
  text-align:right;
  max-width:60%;
  word-break:break-all;
}

.ticket-code{
  font-family:'Courier New',monospace;
  font-size:12px;
  background:rgba(255,255,255,0.1);
  padding:3px 8px;
  border-radius:6px;
  letter-spacing:0.5px;
}

/* Button */
.btn{
  display:block;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:0.5px;
  transition:transform 0.1s;
}
.btn:active{transform:scale(0.97)}
.btn-ok{background:#2ecc71;color:#000}
.btn-used{background:#e74c3c;color:#fff}
.btn-warn{background:#e67e22;color:#fff}

/* Loading modal */
.loading-content{
  text-align:center;
  color:#c9a44a;
  padding:40px 20px;
}
.loading-content .spinner{
  width:48px;height:48px;
  border:4px solid rgba(201,164,74,0.2);
  border-top-color:#c9a44a;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-content p{font-size:16px;font-weight:600}
</style>
</head>

<body>

<div class="scan-page">
  <div class="header">
    <h1>SILVER ERA Check-in</h1>
    <div class="subtitle">Quét mã QR trên vé để check-in</div>
    <div class="scan-count" id="counter"></div>
  </div>
  <div id="reader"></div>
</div>

<div id="modal"></div>

<script>

var api="https://script.google.com/macros/s/AKfycbyF1MoHYIAapOYF0F3ck9j9ntmpktGkccOttNETjaengFN0N753HHin20tovtmCqjNY/exec";

var scanning = true;
var checkedIn = 0;

var scanner = new Html5QrcodeScanner("reader",{
  fps:10,
  qrbox:{width:220,height:220},
  rememberLastUsedCamera:true,
  showTorchButtonIfSupported:true
});

function makeRow(label,value){
  return "<div class='row'><span class='label'>"+label+"</span><span class='value'>"+(value||"—")+"</span></div>";
}

function closeModal(){
  document.getElementById("modal").innerHTML="";
  scanning = true;
}

function showLoading(){
  document.getElementById("modal").innerHTML=
    "<div class='modal-overlay bg-loading'>"+
    "<div class='loading-content'>"+
    "<div class='spinner'></div>"+
    "<p>Đang kiểm tra vé...</p>"+
    "</div></div>";
}

function showResult(type, icon, titleClass, titleText, name, infoHtml, btnClass){
  document.getElementById("modal").innerHTML=
    "<div class='modal-overlay bg-"+type+"'>"+
    "<div class='modal modal-"+type+"'>"+
    "<div class='icon'>"+icon+"</div>"+
    "<div class='title "+titleClass+"'>"+titleText+"</div>"+
    (name ? "<div class='name'>"+name+"</div>" : "")+
    "<div class='info'>"+infoHtml+"</div>"+
    "<button class='btn "+btnClass+"' onclick='closeModal()'>Quét tiếp</button>"+
    "</div></div>";
}

function updateCounter(){
  document.getElementById("counter").textContent=
    checkedIn > 0 ? "Đã check-in: "+checkedIn+" khách" : "";
}

function onScanSuccess(scanned){

  if(!scanning) return;
  scanning = false;

  var ticket = scanned;
  try {
    var url = new URL(scanned);
    var t = url.searchParams.get("ticket");
    if(t) ticket = t;
  } catch(e) {}

  showLoading();

  fetch(api+"?ticket="+encodeURIComponent(ticket)+"&format=json")
  .then(function(r){
    if(!r.ok) throw new Error("HTTP "+r.status);
    return r.json();
  })
  .then(function(data){

    var info =
      makeRow("SĐT",data.phone)+
      makeRow("Email",data.email)+
      makeRow("Tổ chức",data.org)+
      makeRow("Hạng vé",data.ticketType)+
      makeRow("Số lượng",data.quantity)+
      makeRow("Mã vé","<span class='ticket-code'>"+data.ticket+"</span>");

    if(data.status=="ok"){
      checkedIn++;
      updateCounter();
      showResult("ok","✅","green","CHECK-IN THÀNH CÔNG",data.name,info,"btn-ok");
    }
    else if(data.status=="used"){
      showResult("used","❌","red","VÉ ĐÃ SỬ DỤNG",data.name,info,"btn-used");
    }
    else{
      showResult("notfound","⚠️","orange","KHÔNG TÌM THẤY VÉ",null,
        makeRow("Mã quét","<span class='ticket-code'>"+(data.ticket||ticket)+"</span>"),
        "btn-warn");
    }

  })
  .catch(function(err){
    console.error("Lỗi:",err);
    document.getElementById("modal").innerHTML=
      "<div class='modal-overlay bg-error'>"+
      "<div class='modal modal-error'>"+
      "<div class='icon'>⚠️</div>"+
      "<div class='title red'>LỖI KẾT NỐI</div>"+
      "<div class='info'><div class='row'><span class='label'>Chi tiết</span><span class='value'>"+err.message+"</span></div></div>"+
      "<button class='btn btn-used' onclick='closeModal()'>Thử lại</button>"+
      "</div></div>";
  });

}

scanner.render(onScanSuccess);

</script>

</body>
</html>
