<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{font-family:Arial;text-align:center;padding:20px}
.card{max-width:350px;margin:15px auto;padding:20px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.card-ok{border-top:5px solid #27ae60}
.card-used{border-top:5px solid #e74c3c}
.card-notfound{border-top:5px solid #e74c3c}
.card h2{margin:0 0 5px}
.card .status{font-size:26px;font-weight:bold;margin-bottom:10px}
.card .status.green{color:#27ae60}
.card .status.red{color:#e74c3c}
.card .info{text-align:left;background:#f8f8f8;border-radius:8px;padding:12px 15px;margin-top:12px;font-size:15px;line-height:1.8}
.card .info b{display:inline-block;min-width:90px}
.card .ticket-code{font-family:monospace;font-size:14px;background:#eee;padding:4px 8px;border-radius:4px}
</style>
</head>

<body>

<h2>Check-in vé</h2>
<div id="reader" style="width:300px;margin:auto"></div>

<div id="result"></div>

<script>

var api="https://script.google.com/macros/s/AKfycbyF1MoHYIAapOYF0F3ck9j9ntmpktGkccOttNETjaengFN0N753HHin20tovtmCqjNY/exec";

var scanning = true;

var scanner = new Html5QrcodeScanner("reader",{fps:10,qrbox:250});

function onScanSuccess(scanned){

  // Chặn quét trùng lặp
  if(!scanning) return;
  scanning = false;

  // QR có thể chứa URL đầy đủ hoặc mã vé thuần
  // Trích xuất mã vé từ URL nếu cần
  var ticket = scanned;
  try {
    var url = new URL(scanned);
    var t = url.searchParams.get("ticket");
    if(t) ticket = t;
  } catch(e) {
    // Không phải URL → dùng nguyên giá trị đã quét
  }

  document.getElementById("result").innerHTML=
    "<div style='color:orange;font-size:22px'>Đang kiểm tra vé...</div>";

  fetch(api+"?ticket="+encodeURIComponent(ticket)+"&format=json")
  .then(function(r){
    if(!r.ok) throw new Error("HTTP "+r.status);
    return r.json();
  })
  .then(function(data){

    var el = document.getElementById("result");

    if(data.status=="ok"){
      el.innerHTML=
        "<div class='card card-ok'>"+
        "<div class='status green'>✅ CHECK-IN THÀNH CÔNG</div>"+
        "<h2>"+data.name+"</h2>"+
        "<div class='info'>"+
        "<b>SĐT:</b> "+(data.phone||"—")+"<br>"+
        "<b>Email:</b> "+(data.email||"—")+"<br>"+
        "<b>Hạng vé:</b> "+(data.ticketType||"—")+"<br>"+
        "<b>Số lượng:</b> "+(data.quantity||"—")+"<br>"+
        "<b>Mã vé:</b> <span class='ticket-code'>"+(data.ticket||"—")+"</span>"+
        "</div></div>";
    }
    else if(data.status=="used"){
      el.innerHTML=
        "<div class='card card-used'>"+
        "<div class='status red'>❌ VÉ ĐÃ SỬ DỤNG</div>"+
        "<h2>"+data.name+"</h2>"+
        "<div class='info'>"+
        "<b>SĐT:</b> "+(data.phone||"—")+"<br>"+
        "<b>Email:</b> "+(data.email||"—")+"<br>"+
        "<b>Hạng vé:</b> "+(data.ticketType||"—")+"<br>"+
        "<b>Số lượng:</b> "+(data.quantity||"—")+"<br>"+
        "<b>Mã vé:</b> <span class='ticket-code'>"+(data.ticket||"—")+"</span>"+
        "</div></div>";
    }
    else{
      el.innerHTML=
        "<div class='card card-notfound'>"+
        "<div class='status red'>⚠️ KHÔNG TÌM THẤY VÉ</div>"+
        "<p>Mã quét: <span class='ticket-code'>"+(data.ticket||ticket)+"</span></p>"+
        "</div>";
    }

  })
  .catch(function(err){
    console.error("Lỗi:",err);
    document.getElementById("result").innerHTML=
      "<div class='used'>⚠️ LỖI KẾT NỐI<br>"+err.message+"</div>";
  })
  .finally(function(){
    // Cho phép quét lại sau 3 giây
    setTimeout(function(){ scanning = true; }, 3000);
  });

}

scanner.render(onScanSuccess);

</script>

</body>
</html>
